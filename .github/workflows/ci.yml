name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck:
    name: TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npm run type-check

  lint:
    name: ESLint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npm run lint -- --max-warnings 0

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npm run build
        env:
          # Minimum env vars to pass validate-env preflight.
          # Real secrets are set in Vercel for actual deploys.
          ANTHROPIC_API_KEY: sk-ant-ci-placeholder
          CLERK_SECRET_KEY: sk_test_ci_placeholder
          CLERK_WEBHOOK_SECRET: whsec_ci_placeholder
          SUPABASE_SERVICE_ROLE_KEY: ci_placeholder
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: pk_test_ci_placeholder
          NEXT_PUBLIC_CLERK_SIGN_IN_URL: /sign-in
          NEXT_PUBLIC_CLERK_SIGN_UP_URL: /sign-up
          NEXT_PUBLIC_CLERK_AFTER_SIGN_IN_URL: /dashboard
          NEXT_PUBLIC_CLERK_AFTER_SIGN_UP_URL: /onboarding
          NEXT_PUBLIC_SUPABASE_URL: https://ci.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ci_placeholder
          NEXT_PUBLIC_APP_URL: https://ci.local
          STRIPE_SECRET_KEY: sk_test_ci_placeholder
          STRIPE_WEBHOOK_SECRET: whsec_ci_placeholder
          NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: pk_test_ci_placeholder
          STRIPE_PRICE_STARTER: price_ci_placeholder
          STRIPE_PRICE_STANDARD: price_ci_placeholder
          STRIPE_PRICE_PRO: price_ci_placeholder
          STRIPE_PRICE_UNLIMITED: price_ci_placeholder
          CF_ACCOUNT_ID: ci_placeholder
          CF_R2_ACCESS_KEY_ID: ci_placeholder
          CF_R2_SECRET_ACCESS_KEY: ci_placeholder
          CF_R2_BUCKET_NAME: ci_placeholder
          RESEND_API_KEY: re_ci_placeholder
